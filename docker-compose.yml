services:
  nginx:
    image: nginx:1.29-alpine
    container_name: recordapp-proxy

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - frontend
      - backend

    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    image: recordapp-backend
    container_name: recordapp-backend

    expose:
      - "8080"

    env_file:
      - .env

    environment:
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    image: recordapp-frontend
    container_name: recordapp-frontend

    expose:
      - "80"

    depends_on:
      - backend

    restart: unless-stopped